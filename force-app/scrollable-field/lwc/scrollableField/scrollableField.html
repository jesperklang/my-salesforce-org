<template>
  <lightning-card icon-name={iconName}>
    <!-- Card Header -->
    <h2 class="slds-form-element__label" slot="title">{fieldLabel}</h2>

    <!-- Show spinner while loading -->
    <template lwc:if={loading}>
      <lightning-spinner
        alternative-text="Loading"
        size="xx-small"
        variant="base"
      ></lightning-spinner>
    </template>
    <!-- Display the field when data is loaded -->
    <template lwc:else>
      <div class="slds-scrollable_y slds-p-horizontal_small">
        <lightning-record-view-form
          record-id={recordId}
          object-api-name={objectApiName}
        >
          <lightning-output-field
            field-name={fieldApiName}
            variant="label-hidden"
          ></lightning-output-field>
        </lightning-record-view-form>
      </div>
    </template>
    <!-- Display errors if there are any -->
    <template lwc:if={errors}>
      <div class="slds-p-horizontal_small slds-p-bottom_small">
        <lightning-formatted-text
          value="Oops! Something went wrong."
        ></lightning-formatted-text>
      </div>
    </template>
  </lightning-card>
</template>
